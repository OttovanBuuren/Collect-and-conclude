<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collect &amp; Conclude — powered by Ohpen</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#13322B;--accent:#00C08B;--lime:#33FF99;--white:#FFFFFF;--text-dark:#13322B;
  --radius:8px;--radius-sm:4px;--font:Arial,Helvetica,sans-serif;
  --shadow:0 2px 8px rgba(0,0,0,.18);
}
html{font-size:16px}
body{font-family:var(--font);background:#f4f6f5;color:var(--text-dark);min-height:100vh;display:flex;flex-direction:column}

/* ---- HEADER ---- */
header{background:var(--dark);padding:1.25rem 2rem;display:flex;align-items:baseline;gap:.6rem}
header h1{color:var(--white);font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
header span.powered{color:var(--accent);font-size:.85rem;font-weight:400}

/* ---- PROGRESS ---- */
.progress-bar{background:var(--dark);padding:.75rem 2rem 1.25rem;display:flex;justify-content:center;gap:0;position:sticky;top:0;z-index:50}
.progress-bar .step-ind{display:flex;align-items:center}
.progress-bar .step-ind:last-child .line{display:none}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;border:2px solid rgba(255,255,255,.25);color:rgba(255,255,255,.4);transition:all .3s}
.step-circle.active{border-color:var(--accent);background:var(--accent);color:var(--dark)}
.step-circle.done{border-color:var(--accent);background:transparent;color:var(--accent)}
.step-label{margin-left:.5rem;font-size:.8rem;color:rgba(255,255,255,.4);white-space:nowrap;transition:color .3s}
.step-label.active,.step-label.done{color:var(--white)}
.line{width:60px;height:2px;background:rgba(255,255,255,.15);margin:0 .75rem;flex-shrink:0}
.line.done{background:var(--accent)}

/* ---- MAIN ---- */
main{flex:1;max-width:1120px;width:100%;margin:0 auto;padding:2rem 2rem 6rem}
.step-section{display:none;animation:fadeIn .35s ease}
.step-section.visible{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

h2{font-size:1.35rem;margin-bottom:.25rem}
.subtitle{color:#666;margin-bottom:1.5rem;font-size:.95rem}

/* ---- STICKY BOTTOM BAR ---- */
.sticky-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid #ddd;padding:.75rem 2rem;display:flex;justify-content:center;gap:.75rem;z-index:40;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.sticky-bottom .inner{max-width:1120px;width:100%;display:flex;gap:.75rem;align-items:center}
.sticky-bottom .spacer{flex:1}

/* ---- STEP 1: Categories & Cards ---- */
.category-section{margin-bottom:1.75rem}
.category-header{font-size:.95rem;font-weight:700;color:var(--dark);margin-bottom:.65rem;padding-bottom:.35rem;border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:.5rem}
.category-header .cat-icon{font-size:1.1rem}
.doc-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.75rem}
.doc-card{background:var(--white);border:2px solid #ddd;border-radius:var(--radius);padding:1.1rem 1.2rem;cursor:pointer;transition:all .2s;position:relative}
.doc-card:hover:not(.disabled){border-color:var(--accent);box-shadow:var(--shadow)}
.doc-card.selected{border-color:var(--accent);background:rgba(0,192,139,.07)}
.doc-card h3{font-size:.92rem;margin-bottom:.25rem;line-height:1.3}
.doc-card p{font-size:.78rem;color:#555;line-height:1.4}
.doc-card.disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.doc-card .coming-soon{position:absolute;top:.55rem;right:.55rem;font-size:.6rem;background:#e0e0e0;color:#777;padding:2px 7px;border-radius:var(--radius-sm);font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.doc-card .active-badge{position:absolute;top:.55rem;right:.55rem;font-size:.6rem;background:var(--accent);color:var(--dark);padding:2px 7px;border-radius:var(--radius-sm);font-weight:700;text-transform:uppercase;letter-spacing:.03em}

/* ---- ADD CUSTOM FIELD per group ---- */
.add-custom-field{border-top:1px dashed #ddd;padding:.85rem 1rem;background:#fafbfa;display:flex;flex-wrap:wrap;gap:.6rem;align-items:flex-end}
.add-custom-field .acf-label{font-size:.78rem;font-weight:700;color:#666;margin-bottom:.25rem;display:block}
.add-custom-field input,.add-custom-field select,.add-custom-field textarea{font-family:var(--font);border:1px solid #ccc;border-radius:var(--radius-sm);padding:.4rem .6rem;font-size:.82rem;background:#fff}
.add-custom-field input:focus,.add-custom-field select:focus,.add-custom-field textarea:focus{outline:none;border-color:var(--accent)}
.acf-name{width:150px}
.acf-type{width:110px}
.acf-desc{flex:1;min-width:200px;resize:vertical;min-height:52px}
.acf-group{display:flex;flex-direction:column}
.custom-field-row td{background:rgba(255,184,77,.05)}
.custom-field-badge{font-size:.6rem;background:#FFB84D;color:#fff;padding:1px 6px;border-radius:var(--radius-sm);font-weight:700;margin-left:.4rem;vertical-align:middle}
.custom-field-desc{font-size:.75rem;color:#888;font-style:italic;margin-top:.2rem;line-height:1.35}
.remove-custom-field{background:none;border:none;cursor:pointer;color:#ccc;font-size:.95rem;margin-left:.4rem;vertical-align:middle}
.remove-custom-field:hover{color:#e74c3c}

/* ---- STEP 2: Grouped fields ---- */
.field-group{background:var(--white);border:1px solid #ddd;border-radius:var(--radius);margin-bottom:.75rem;overflow:hidden}
.field-group-header{padding:.8rem 1rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:.9rem;user-select:none;background:#fafbfa;border-bottom:1px solid #eee}
.field-group-header:hover{background:#f2f5f3}
.field-group-header .arrow{transition:transform .2s;font-size:.7rem;color:#999}
.field-group.open .arrow{transform:rotate(90deg)}
.field-group-header .group-meta{display:flex;align-items:center;gap:.6rem}
.field-group-header .group-count{font-size:.72rem;font-weight:400;color:#888;background:#eee;padding:2px 8px;border-radius:10px}
.field-group-header .repeatable-badge{font-size:.62rem;background:#FFB84D;color:#fff;padding:2px 7px;border-radius:var(--radius-sm);font-weight:700;text-transform:uppercase}
.field-group-body{display:none;padding:0}
.field-group.open .field-group-body{display:block}

/* Field table */
.field-table{width:100%;border-collapse:collapse}
.field-table th{text-align:left;font-size:.72rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;padding:.55rem 1rem;border-bottom:1px solid #eee;background:#fafbfa}
.field-table td{padding:.6rem 1rem;border-bottom:1px solid #f3f3f3;font-size:.85rem;vertical-align:top}
.field-table tr:last-child td{border-bottom:none}
.field-table tr:hover{background:#f8faf9}
.field-table .cb-cell{width:50px;text-align:center}
.field-table .name-cell{width:220px}
.field-table .type-cell{width:90px}
.field-table .mandatory-cell{width:90px;text-align:center}
.field-table .auto-cell{width:160px;text-align:center}

/* Type badges */
.type-badge{font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block;white-space:nowrap}
.type-badge.text{background:#E3F2FD;color:#1565C0}
.type-badge.date{background:#F3E5F5;color:#7B1FA2}
.type-badge.decimal,.type-badge.integer{background:#FFF3E0;color:#E65100}
.type-badge.boolean{background:#E8F5E9;color:#2E7D32}

/* Auto-extract indicator */
.auto-yes{color:var(--accent);font-weight:700;font-size:.78rem}
.auto-no{color:#bbb;font-size:.78rem}

/* Mandatory toggle */
.toggle-wrap{display:inline-flex;align-items:center;cursor:pointer}
.toggle-track{width:34px;height:18px;border-radius:9px;background:#ddd;position:relative;transition:background .2s}
.toggle-track.on{background:var(--accent)}
.toggle-knob{width:14px;height:14px;border-radius:50%;background:var(--white);position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-track.on .toggle-knob{left:18px}

/* Enum values */
.enum-area{margin-top:.4rem}
.enum-pills{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.3rem}
.enum-pill{font-size:.72rem;padding:2px 8px;border-radius:10px;background:rgba(0,192,139,.1);border:1px solid rgba(0,192,139,.3);color:var(--text-dark);display:inline-flex;align-items:center;gap:.3rem}
.enum-pill button{background:none;border:none;cursor:pointer;font-size:.85rem;color:#999;line-height:1;padding:0}
.enum-pill button:hover{color:red}
.enum-pill.custom-enum{background:rgba(255,184,77,.12);border-color:rgba(255,184,77,.4)}
.enum-add{display:inline-flex;align-items:center;gap:.3rem}
.enum-add input{width:120px;padding:2px 6px;border:1px solid #ccc;border-radius:var(--radius-sm);font-size:.75rem;font-family:var(--font)}
.enum-add input:focus{outline:none;border-color:var(--accent)}
.enum-add button{font-size:.72rem;padding:2px 8px;border:1px solid var(--accent);background:rgba(0,192,139,.08);color:var(--text-dark);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font)}

/* ---- STEP 3 ---- */
.field-rules{display:flex;flex-direction:column;gap:.6rem}
.rule-row{background:var(--white);border:1px solid #ddd;border-radius:var(--radius);overflow:hidden}
.rule-header{padding:.85rem 1rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:.92rem;user-select:none}
.rule-header:hover{background:#fafafa}
.rule-header .arrow{transition:transform .2s;font-size:.75rem;color:#999}
.rule-row.open .arrow{transform:rotate(90deg)}
.rule-body{padding:0 1rem 1rem;display:none}
.rule-row.open .rule-body{display:block}
.rule-option{display:flex;align-items:center;gap:.5rem;padding:.35rem 0;font-size:.88rem}
.rule-option input[type="checkbox"]{width:15px;height:15px}
.active-rules{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.5rem}
.active-rules .pill{font-size:.78rem;padding:.2rem .6rem}
.custom-rule-area{margin-top:.75rem;border-top:1px solid #eee;padding-top:.65rem}
.custom-rule-area summary{font-size:.82rem;color:var(--accent);font-weight:600;cursor:pointer}
.custom-rule-area textarea{width:100%;margin-top:.45rem;padding:.5rem;border:1px solid #ccc;border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;resize:vertical;min-height:50px}
.custom-rule-area textarea:focus{outline:none;border-color:var(--accent)}
.custom-rule-list{margin-top:.5rem;display:flex;flex-direction:column;gap:.3rem}
.custom-rule-tag{background:rgba(0,192,139,.1);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:.35rem .6rem;font-size:.82rem;display:flex;align-items:center;gap:.4rem}
.custom-rule-tag .badge{font-size:.6rem;background:var(--accent);color:var(--dark);padding:1px 5px;border-radius:var(--radius-sm);font-weight:700}
.custom-rule-tag button{background:none;border:none;cursor:pointer;color:#999;font-size:.9rem}
.custom-rule-tag button:hover{color:red}
.rule-header .mandatory-flag{font-size:.62rem;background:#FF6B6B;color:#fff;padding:2px 7px;border-radius:var(--radius-sm);font-weight:700;text-transform:uppercase;margin-left:.5rem}

/* ---- SUMMARY ---- */
.summary-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.75rem;margin-bottom:1.5rem}
.summary-card h3{font-size:1rem;margin-bottom:.15rem}
.summary-card .doc-type{font-size:1.1rem;color:var(--accent);font-weight:700;margin-bottom:1.25rem}
.summary-field{padding:.6rem 0;border-bottom:1px solid #eee}
.summary-field:last-child{border-bottom:none}
.summary-field h4{font-size:.92rem;margin-bottom:.25rem;display:flex;align-items:center;gap:.4rem}
.summary-field ul{list-style:disc;padding-left:1.25rem}
.summary-field li{font-size:.84rem;color:#444;padding:.15rem 0}
.summary-field li .badge{font-size:.6rem;background:var(--accent);color:var(--dark);padding:1px 5px;border-radius:var(--radius-sm);font-weight:700;margin-left:.3rem}
.summary-meta{display:flex;gap:1rem;margin-bottom:.35rem;flex-wrap:wrap}
.summary-meta span{font-size:.78rem;color:#666}
.summary-meta strong{color:var(--text-dark)}

/* ---- BADGES / PILLS shared ---- */
.badge{font-size:.65rem;background:var(--accent);color:var(--dark);padding:1px 6px;border-radius:var(--radius-sm);font-weight:700}

/* ---- BUTTONS ---- */
.btn{padding:.65rem 1.6rem;border:none;border-radius:var(--radius);font-family:var(--font);font-size:.92rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:var(--dark)}
.btn-primary:hover{background:var(--lime)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-secondary{background:transparent;border:2px solid var(--accent);color:var(--accent)}
.btn-secondary:hover{background:rgba(0,192,139,.08)}
.btn-sm{padding:.4rem 1rem;font-size:.82rem}
.btn-group{display:flex;gap:.75rem;margin-top:1.75rem;flex-wrap:wrap}
input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}
.pill{background:var(--accent);color:var(--dark);font-size:.82rem;font-weight:600;padding:.3rem .7rem;border-radius:20px;display:inline-flex;align-items:center;gap:.35rem;animation:fadeIn .2s}
.pill button{background:none;border:none;cursor:pointer;font-size:1rem;line-height:1;color:var(--dark);opacity:.6}
.pill button:hover{opacity:1}

/* ---- TOAST ---- */
.toast{position:fixed;bottom:5rem;right:2rem;background:var(--dark);color:var(--white);padding:1rem 1.5rem;border-radius:var(--radius);box-shadow:0 4px 20px rgba(0,0,0,.3);font-size:.92rem;transform:translateY(120%);opacity:0;transition:all .35s ease;z-index:100;border-left:4px solid var(--accent)}
.toast.show{transform:translateY(0);opacity:1}

/* Selection counter in sticky bar */
.selection-count{font-size:.85rem;color:#666}
.selection-count strong{color:var(--accent)}

/* ---- RESPONSIVE ---- */
@media(max-width:768px){
  header{padding:1rem}
  main{padding:1.25rem 1rem 6rem}
  .doc-cards{grid-template-columns:1fr}
  .line{width:30px}
  .step-label{display:none}
  .field-table th,.field-table td{padding:.45rem .5rem;font-size:.78rem}
  .field-table .auto-cell{display:none}
}
</style>
</head>

<main id="app"></main>

<div id="stickyBar"></div>

<script>

  {

    docs: [

      {id:'tax_return_y1',          name:'Income Tax Return (Year -1)',            desc:'Filed personal income tax return for the previous year', enabled:false},
      {id:'tax_return_y2',          name:'Income Tax Return (Year -2)',            desc:'Filed personal income tax return for two years ago', enabled:false},

// Validation rules per field type
const RULES = {
  Date:[
    'Must not be more than 1 month in the past','Must not be more than 3 months in the past',
    'Must not be more than 6 months in the past','Must not be a future date','Must be within the current calendar year'
  ],
  Decimal:[
    'Must be greater than 0','Must be greater than \u20ac1,000','Must be greater than \u20ac10,000',
    'Net must be less than gross (cross-field rule)'
  ],
  Integer:[
    'Must be greater than 0','Must be a whole number'
  ],
  Text:[
    'Must not be empty','Must match across documents (e.g. name on salary slip matches name on contract)',
    'Must match expected format'
  ],
  Boolean:[
    'Must be true','Must be false'
  ]
};

// ===== STATE =====
let state = {
  step: 1,
  docType: null,
  // Step 2: keyed by field key
  selectedFields: {},       // key -> true
  mandatoryFields: {},      // key -> true
  customEnums: {},          // key -> [string]
  customGroupFields: {},    // gi -> [{key, label, description, type, dta, enums, isCustom}]
  // Step 3
  fieldRules: {},           // key -> [rule string]
  fieldCustomRules: {}      // key -> [rule string]
};

const STEPS = [{n:1,label:'Document type'},{n:2,label:'Configure fields'},{n:3,label:'Validation rules'}];

// ===== HELPERS =====
function getSelectedCount(){
  return Object.keys(state.selectedFields).filter(k => state.selectedFields[k]).length;
}

function getAllSelectedFieldObjects(){
  const result = [];
  SALARY_FIELD_GROUPS.forEach((g, gi) => {
    g.fields.forEach(f => {
      if(state.selectedFields[f.key]) result.push({...f, group: g.group});
    });
    (state.customGroupFields[gi] || []).forEach(f => {
      if(state.selectedFields[f.key]) result.push({...f, group: g.group});
    });
  });
  return result;
}

// ===== RENDER =====
function renderProgress(){
  document.getElementById('progressBar').innerHTML = STEPS.map((s,i)=>{
    const cls = s.n < state.step ? 'done' : s.n === state.step ? 'active' : '';
    const lineCls = s.n < state.step ? 'done' : '';
    return `<div class="step-ind">
      <div class="step-circle ${cls}">${s.n < state.step ? '\u2713' : s.n}</div>
      <div class="step-label ${cls}">${s.label}</div>
      ${i < STEPS.length-1 ? `<div class="line ${lineCls}"></div>` : ''}
    </div>`;
  }).join('');
}

function render(scrollToTop){
  renderProgress();
  const app = document.getElementById('app');
  if(state.step===1) renderStep1(app);
  else if(state.step===2) renderStep2(app);
  else if(state.step===3) renderStep3(app);
  else renderSummary(app);
  if(scrollToTop) window.scrollTo({top:0,behavior:'smooth'});
}

// --- STEP 1 ---
function renderStep1(el){
  let html = `
    <h2>Select document type</h2>
    <p class="subtitle">Choose the document you want to configure for data extraction and validation. Documents marked <strong>Active</strong> are fully configurable.</p>`;

  CATEGORIES.forEach(cat => {
    html += `<div class="category-section">
      <div class="category-header"><span class="cat-icon">${cat.icon}</span> ${cat.name}</div>
      <div class="doc-cards">`;
    cat.docs.forEach(d => {
      const sel = state.docType === d.id;
      const cls = sel ? 'doc-card selected' : (d.enabled ? 'doc-card' : 'doc-card disabled');
      const badge = d.enabled ? '<span class="active-badge">Active</span>' : '<span class="coming-soon">Coming soon</span>';
      html += `<div class="${cls}" data-id="${d.id}">
        ${badge}<h3>${d.name}</h3><p>${d.desc}</p>
      </div>`;
    });
    html += `</div></div>`;
  });

  el.innerHTML = html;

  // Sticky bar
  document.getElementById('stickyBar').innerHTML = `<div class="sticky-bottom"><div class="inner">
    <span class="selection-count">${state.docType ? 'Selected: <strong>' + ALL_DOCS.find(d=>d.id===state.docType).name + '</strong>' : 'No document selected'}</span>
    <span class="spacer"></span>
    <button class="btn btn-primary" id="nextBtn" ${!state.docType?'disabled':''}>Next \u2192</button>
  </div></div>`;

  el.querySelectorAll('.doc-card:not(.disabled)').forEach(c => c.addEventListener('click', () => {
    state.docType = c.dataset.id;
    state.selectedFields = {};
    state.mandatoryFields = {};
    state.customEnums = {};
    state.customGroupFields = {};
    state.fieldRules = {};
    state.fieldCustomRules = {};
    render();
  }));

  document.getElementById('nextBtn').addEventListener('click', () => {
    if(state.docType){state.step = 2; render(true);}
  });
}

// --- STEP 2 helpers for lightweight updates ---
function updateStep2StickyBar(){
  const selCount = getSelectedCount();
  const mandCount = Object.keys(state.mandatoryFields).filter(k => state.mandatoryFields[k] && state.selectedFields[k]).length;
  const bar = document.getElementById('stickyBar');
  if(!bar) return;
  const countEl = bar.querySelector('.selection-count');
  if(countEl) countEl.innerHTML = `<strong>${selCount}</strong> field${selCount!==1?'s':''} selected${selCount > 0 ? ', <strong>' + mandCount + '</strong> mandatory' : ''}`;
  const nextBtn = document.getElementById('nextBtn');
  if(nextBtn) nextBtn.disabled = selCount === 0;
}

function updateGroupCounts(){
  document.querySelectorAll('.field-group').forEach(grp => {
    const gi = grp.dataset.gi;
    if(gi === undefined) return;
    const g = SALARY_FIELD_GROUPS[gi];
    if(!g) return;
    const customFields = state.customGroupFields[gi] || [];
    const allFields = [...g.fields, ...customFields];
    const total = allFields.length;
    const selected = allFields.filter(f => state.selectedFields[f.key]).length;
    const countEl = grp.querySelector('.group-count');
    if(countEl) countEl.textContent = `${selected} / ${total} selected`;
  });
}

// --- STEP 2 ---
function renderStep2(el){
  const doc = ALL_DOCS.find(d => d.id === state.docType);
  const selCount = getSelectedCount();

  let html = `
    <h2>Configure fields</h2>
    <p class="subtitle">Select and configure the fields to extract from the <strong>${doc.name}</strong>. Toggle extraction and mandatory status per field.</p>`;

  SALARY_FIELD_GROUPS.forEach((g, gi) => {
    const customFields = state.customGroupFields[gi] || [];
    const allGroupFields = [...g.fields, ...customFields];
    const groupFieldCount = allGroupFields.length;
    const groupSelectedCount = allGroupFields.filter(f => state.selectedFields[f.key]).length;
    html += `<div class="field-group open" data-gi="${gi}">
      <div class="field-group-header" data-gi="${gi}">
        <div class="group-meta">
          <span>${g.group}</span>
          ${g.repeatable ? '<span class="repeatable-badge">Repeatable</span>' : ''}
          <span class="group-count">${groupSelectedCount} / ${groupFieldCount} selected</span>
        </div>
        <span class="arrow">\u25B6</span>
      </div>
      <div class="field-group-body">
        <table class="field-table">
          <thead><tr>
            <th class="cb-cell">Include</th>
            <th class="name-cell">Field Name</th>
            <th class="mandatory-cell">Mandatory</th>
            <th class="type-cell">Data Type</th>
            <th class="auto-cell">Automatically Extracted</th>
          </tr></thead>
          <tbody>`;

    // Helper to render a single field row
    const renderFieldRow = (f, isCustom) => {
      const isSelected = !!state.selectedFields[f.key];
      const isMandatory = !!state.mandatoryFields[f.key];
      const typeLower = f.type.toLowerCase();
      let row = `<tr class="${isCustom ? 'custom-field-row' : ''}">
        <td class="cb-cell"><input type="checkbox" data-key="${f.key}" class="field-cb" ${isSelected?'checked':''}></td>
        <td>
          <div style="font-weight:600;margin-bottom:.15rem">${f.label}${isCustom ? '<span class="custom-field-badge">Custom</span>' : ''}</div>`;
      if(isCustom && f.description){
        row += `<div class="custom-field-desc">${f.description}</div>`;
      }
      if(f.enums && f.enums.length > 0){
        row += `<div class="enum-area"><div class="enum-pills">`;
        (f.enums || []).forEach(ev => { row += `<span class="enum-pill">${ev}</span>`; });
        (state.customEnums[f.key] || []).forEach((ev, ei) => {
          row += `<span class="enum-pill custom-enum">${ev}<button data-key="${f.key}" data-ei="${ei}" class="remove-enum">&times;</button></span>`;
        });
        row += `</div><div class="enum-add">
          <input type="text" placeholder="Add value\u2026" data-key="${f.key}" class="enum-input">
          <button data-key="${f.key}" class="add-enum-btn">+ Add</button>
        </div></div>`;
      }
      row += `</td>
        <td class="mandatory-cell">
          <label class="toggle-wrap" data-key="${f.key}">
            <div class="toggle-track ${isMandatory && isSelected ? 'on' : ''}" data-key="${f.key}">
              <div class="toggle-knob"></div>
            </div>
          </label>
        </td>
        <td class="type-cell"><span class="type-badge ${typeLower}">${f.type}</span></td>
        <td class="auto-cell">${f.dta ? '<span class="auto-yes">Yes</span>' : '<span class="auto-no">No</span>'}</td>
      </tr>`;
      return row;
    };

    g.fields.forEach(f => { html += renderFieldRow(f, false); });
    (state.customGroupFields[gi] || []).forEach((f, cfi) => {
      html += renderFieldRow(f, true).replace('</tr>', `<td style="width:32px;text-align:center"><button class="remove-custom-field" data-gi="${gi}" data-cfi="${cfi}" title="Remove field">&times;</button></td></tr>`);
    });

    html += `</tbody></table></div></div>`;
  });

  // Add custom field section at the bottom
  html += `
    <div class="field-group" style="border:2px dashed var(--accent);background:rgba(0,192,139,.03)">
      <div class="field-group-header" style="cursor:default;background:transparent;border-bottom:none">
        <div class="group-meta"><span style="color:var(--accent)">+ Add a custom field</span></div>
      </div>
      <div class="add-custom-field" style="border-top:none">
        <div class="acf-group"><label class="acf-label">Add to group</label><select id="acfGroup">
          ${SALARY_FIELD_GROUPS.map((g, gi) => `<option value="${gi}">${g.group}</option>`).join('')}
        </select></div>
        <div class="acf-group"><label class="acf-label">Field Name</label><input type="text" id="acfName" placeholder="e.g. Bonus payment"></div>
        <div class="acf-group"><label class="acf-label">Data Type</label><select id="acfType">
          <option value="Text">Text</option>
          <option value="Decimal">Decimal</option>
          <option value="Integer">Integer</option>
          <option value="Date">Date</option>
          <option value="Boolean">Boolean</option>
        </select></div>
        <div class="acf-group" style="flex:1;min-width:100%"><label class="acf-label">Field Description <span style="font-weight:400;color:#aaa">(used as extraction prompt)</span></label>
          <textarea id="acfDesc" class="acf-desc" placeholder="Describe what this field represents and how it appears on the document, e.g. &quot;The one-time bonus payment shown separately on the salary slip below the gross salary line.&quot;"></textarea>
        </div>
        <button class="btn btn-primary btn-sm" id="addCustomFieldBtn" style="align-self:flex-end">+ Add field</button>
      </div>
    </div>`;

  el.innerHTML = html;

  // Sticky bar
  document.getElementById('stickyBar').innerHTML = `<div class="sticky-bottom"><div class="inner">
    <button class="btn btn-secondary" id="backBtn">\u2190 Back</button>
    <span class="selection-count"><strong>${selCount}</strong> field${selCount!==1?'s':''} selected${selCount > 0 ? ', <strong>' + Object.keys(state.mandatoryFields).filter(k=>state.mandatoryFields[k]&&state.selectedFields[k]).length + '</strong> mandatory' : ''}</span>
    <span class="spacer"></span>
    <button class="btn btn-primary" id="nextBtn" ${selCount===0?'disabled':''}>Next \u2192</button>
  </div></div>`;

  // Group toggle
  el.querySelectorAll('.field-group-header').forEach(h => h.addEventListener('click', () => {
    h.parentElement.classList.toggle('open');
  }));

  // Field checkboxes — update state + refresh sticky bar without full re-render
  el.querySelectorAll('.field-cb').forEach(cb => cb.addEventListener('change', () => {
    const key = cb.dataset.key;
    if(cb.checked) {
      state.selectedFields[key] = true;
    } else {
      delete state.selectedFields[key];
      delete state.mandatoryFields[key];
      delete state.fieldRules[key];
      delete state.fieldCustomRules[key];
      // Reset the mandatory toggle visually
      const track = el.querySelector(`.toggle-track[data-key="${key}"]`);
      if(track) track.classList.remove('on');
    }
    updateStep2StickyBar();
    updateGroupCounts();
  }));

  // Mandatory toggles — direct DOM toggle, no re-render
  el.querySelectorAll('.toggle-track').forEach(t => t.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const key = t.dataset.key;
    if(!state.selectedFields[key]) return;
    if(state.mandatoryFields[key]) {
      delete state.mandatoryFields[key];
      t.classList.remove('on');
    } else {
      state.mandatoryFields[key] = true;
      t.classList.add('on');
    }
    updateStep2StickyBar();
  }));

  // Add enum
  el.querySelectorAll('.add-enum-btn').forEach(btn => btn.addEventListener('click', () => {
    const key = btn.dataset.key;
    const input = el.querySelector(`.enum-input[data-key="${key}"]`);
    const val = input.value.trim();
    if(!val) return;
    if(!state.customEnums[key]) state.customEnums[key] = [];
    if(!state.customEnums[key].includes(val)){
      state.customEnums[key].push(val);
      render();
    }
  }));

  // Remove custom enum
  el.querySelectorAll('.remove-enum').forEach(btn => btn.addEventListener('click', () => {
    const key = btn.dataset.key;
    const ei = parseInt(btn.dataset.ei);
    state.customEnums[key].splice(ei, 1);
    render();
  }));

  // Add custom field (single form at bottom)
  document.getElementById('addCustomFieldBtn').addEventListener('click', () => {
    const gi = document.getElementById('acfGroup').value;
    const nameEl = document.getElementById('acfName');
    const typeEl = document.getElementById('acfType');
    const descEl = document.getElementById('acfDesc');
    const name = nameEl.value.trim();
    const desc = descEl.value.trim();
    if(!name) { nameEl.style.borderColor='#e74c3c'; nameEl.focus(); return; }
    if(!desc) { descEl.style.borderColor='#e74c3c'; descEl.focus(); return; }
    if(!state.customGroupFields[gi]) state.customGroupFields[gi] = [];
    const key = 'custom_' + gi + '_' + Date.now();
    state.customGroupFields[gi].push({key, label:name, description:desc, type:typeEl.value, dta:false, enums:[], isCustom:true});
    render();
  });

  // Remove custom field
  el.querySelectorAll('.remove-custom-field').forEach(btn => btn.addEventListener('click', () => {
    const gi = btn.dataset.gi;
    const cfi = parseInt(btn.dataset.cfi);
    const removedKey = state.customGroupFields[gi][cfi].key;
    state.customGroupFields[gi].splice(cfi, 1);
    delete state.selectedFields[removedKey];
    delete state.mandatoryFields[removedKey];
    delete state.fieldRules[removedKey];
    delete state.fieldCustomRules[removedKey];
    render();
  }));

  document.getElementById('backBtn').addEventListener('click', () => {state.step = 1; render(true)});
  document.getElementById('nextBtn').addEventListener('click', () => {if(getSelectedCount()>0){state.step = 3; render(true)}});
}

// --- STEP 3 ---
function renderStep3(el){
  const selectedFields = getAllSelectedFieldObjects();

  el.innerHTML = `
    <h2>Configure validation rules</h2>
    <p class="subtitle">Add validation rules for each selected field.</p>
    <div class="field-rules">${selectedFields.map(f => {
      const rules = RULES[f.type] || RULES.Text;
      const active = state.fieldRules[f.key] || [];
      const customs = state.fieldCustomRules[f.key] || [];
      const isMandatory = !!state.mandatoryFields[f.key];
      return `<div class="rule-row" data-field="${f.key}">
        <div class="rule-header">
          <span>${f.label}${isMandatory ? '<span class="mandatory-flag">Required</span>' : ''}</span>
          <span class="arrow">\u25B6</span>
        </div>
        <div class="rule-body">
          ${rules.map(r => {
            const checked = active.includes(r) ? 'checked' : '';
            return `<div class="rule-option"><input type="checkbox" data-field="${f.key}" data-rule="${r}" ${checked}><span>${r}</span></div>`;
          }).join('')}
          ${active.length ? `<div class="active-rules">${active.map(r => `<span class="pill">${r}<button data-field="${f.key}" data-rule="${r}">&times;</button></span>`).join('')}</div>` : ''}
          ${customs.length ? `<div class="custom-rule-list">${customs.map((r,i) => `<div class="custom-rule-tag"><span class="badge">custom</span><span>${r}</span><button data-field="${f.key}" data-ci="${i}">&times;</button></div>`).join('')}</div>` : ''}
          <details class="custom-rule-area">
            <summary>+ Add custom rule</summary>
            <textarea placeholder="Describe the validation rule in plain language\u2026" data-field="${f.key}"></textarea>
            <button class="btn btn-primary btn-sm" style="margin-top:.4rem" data-addcr="${f.key}">Add rule</button>
          </details>
        </div>
      </div>`;
    }).join('')}</div>`;

  // Sticky bar
  document.getElementById('stickyBar').innerHTML = `<div class="sticky-bottom"><div class="inner">
    <button class="btn btn-secondary" id="backBtn">\u2190 Back</button>
    <span class="spacer"></span>
    <button class="btn btn-primary" id="nextBtn">Review configuration \u2192</button>
  </div></div>`;

  el.querySelectorAll('.rule-header').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('open')));

  el.querySelectorAll('.rule-option input').forEach(cb => cb.addEventListener('change', () => {
    const f = cb.dataset.field, r = cb.dataset.rule;
    if(!state.fieldRules[f]) state.fieldRules[f] = [];
    if(cb.checked){if(!state.fieldRules[f].includes(r)) state.fieldRules[f].push(r)}
    else{state.fieldRules[f] = state.fieldRules[f].filter(x => x !== r)}
    render(); openRow(f);
  }));

  el.querySelectorAll('.active-rules button').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    state.fieldRules[b.dataset.field] = state.fieldRules[b.dataset.field].filter(x => x !== b.dataset.rule);
    render(); openRow(b.dataset.field);
  }));

  el.querySelectorAll('.custom-rule-list button').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    state.fieldCustomRules[b.dataset.field].splice(parseInt(b.dataset.ci), 1);
    render(); openRow(b.dataset.field);
  }));

  el.querySelectorAll('[data-addcr]').forEach(btn => btn.addEventListener('click', () => {
    const f = btn.dataset.addcr;
    const ta = el.querySelector(`textarea[data-field="${f}"]`);
    const v = ta.value.trim();
    if(!v) return;
    if(!state.fieldCustomRules[f]) state.fieldCustomRules[f] = [];
    state.fieldCustomRules[f].push(v);
    render(); openRow(f);
  }));

  document.getElementById('backBtn').addEventListener('click', () => {state.step = 2; render(true)});
  document.getElementById('nextBtn').addEventListener('click', () => {state.step = 4; render(true)});
}

function openRow(fieldKey){
  const row = document.querySelector(`.rule-row[data-field="${fieldKey}"]`);
  if(row) row.classList.add('open');
}

// --- SUMMARY ---
function renderSummary(el){
  const doc = ALL_DOCS.find(d => d.id === state.docType);
  const selectedFields = getAllSelectedFieldObjects();

  el.innerHTML = `
    <h2>Configuration summary</h2>
    <p class="subtitle">Review your extraction and validation configuration.</p>
    <div class="summary-card">
      <h3>Document type</h3>
      <div class="doc-type">${doc.name}</div>
      <h3 style="margin-bottom:.75rem">Configured fields &amp; rules</h3>
      ${selectedFields.map(f => {
        const rules = state.fieldRules[f.key] || [];
        const customs = state.fieldCustomRules[f.key] || [];
        const isMandatory = !!state.mandatoryFields[f.key];
        const allEnums = [...(f.enums||[]), ...(state.customEnums[f.key]||[])];
        return `<div class="summary-field">
          <h4>${f.label}
            <span class="type-badge ${f.type.toLowerCase()}">${f.type}</span>
            ${isMandatory ? '<span style="font-size:.62rem;background:#FF6B6B;color:#fff;padding:2px 7px;border-radius:4px;font-weight:700">REQUIRED</span>' : ''}
            ${f.dta ? '<span style="font-size:.62rem;background:var(--accent);color:var(--dark);padding:2px 7px;border-radius:4px;font-weight:700">AUTO-EXTRACT</span>' : ''}
          </h4>
          <div class="summary-meta">
            <span>Group: <strong>${f.group}</strong></span>
            ${allEnums.length ? '<span>Allowed values: <strong>' + allEnums.join(', ') + '</strong></span>' : ''}
          </div>
          ${rules.length || customs.length ? `<ul>
            ${rules.map(r => `<li>${r}</li>`).join('')}
            ${customs.map(r => `<li>${r}<span class="badge">custom</span></li>`).join('')}
          </ul>` : '<p style="font-size:.84rem;color:#999;margin-top:.15rem">No validation rules configured</p>'}
        </div>`;
      }).join('')}
    </div>`;

  // Sticky bar
  document.getElementById('stickyBar').innerHTML = `<div class="sticky-bottom"><div class="inner">
    <button class="btn btn-secondary" id="backBtn">\u2190 Back</button>
    <span class="spacer"></span>
    <button class="btn btn-primary" id="saveBtn">Save configuration</button>
    <button class="btn btn-secondary" id="resetBtn">Start new configuration</button>
  </div></div>`;

  document.getElementById('backBtn').addEventListener('click', () => {state.step = 3; render(true)});
  document.getElementById('saveBtn').addEventListener('click', () => showToast('Configuration saved successfully!'));
  document.getElementById('resetBtn').addEventListener('click', () => {
    state = {step:1, docType:null, selectedFields:{}, mandatoryFields:{}, customEnums:{}, customGroupFields:{}, fieldRules:{}, fieldCustomRules:{}};
    render(true);
  });
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== INIT =====
render();
</script>
</body>
</html>
